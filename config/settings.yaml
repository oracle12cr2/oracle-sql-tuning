# ============================================
# Oracle SQL Tuning Automation - 설정 파일
# ============================================

# --- Oracle 접속 정보 (RAC 환경) ---
database:
  user: "app_user"
  # password는 환경변수 ORACLE_TUNING_PWD 또는 Oracle Wallet 사용 권장
  password_env: "ORACLE_TUNING_PWD"
  # SCAN Listener로 접속 (RAC 로드밸런싱)
  host: "192.168.50.35"
  port: 1521
  # SID 또는 Service Name 중 하나만 설정 (service_name 우선)
  sid: ""
  service_name: "PROD"
  as_sysdba: false
  # RAC 환경 설정
  rac_instances:
    - "PROD1"
    - "PROD2"
  # RAC 노드 정보
  rac_nodes:
    - host: "192.168.50.31"     # oracle19cogg01
      instance: "PROD1"
      vip: "192.168.50.33"
    - host: "192.168.50.32"     # oracle19cogg02
      instance: "PROD2"
      vip: "192.168.50.34"
  # SCAN Listener
  scan_name: "oracle19cogg-scan"
  scan_ips:
    - "192.168.50.35"
    - "192.168.50.36"
    - "192.168.50.37"

# --- Phase 1: 느린 SQL 감지 임계값 ---
detection:
  # elapsed_time 임계값 (초) - 이 값 이상이면 느린 SQL로 판정
  elapsed_threshold_sec: 3
  # buffer_gets 임계값 - 실행당 buffer gets가 이 값 이상
  buffer_gets_threshold: 100000
  # disk_reads 임계값 - 실행당 disk reads가 이 값 이상
  disk_reads_threshold: 10000
  # 최근 N분 이내 실행된 SQL만 대상
  recent_minutes: 1440
  # 제외할 SQL 패턴 (정규식)
  exclude_patterns:
    - "^SELECT .* FROM V\\$"       # V$ 뷰 조회 제외
    - "^SELECT .* FROM GV\\$"      # GV$ 뷰 조회 제외
    - "^/\\*.*tuning_auto\\*/"     # 자동화 도구 자체 쿼리 제외
    - "DBMS_"                       # DBMS 패키지 호출 제외
  # 제외할 사용자
  exclude_users:
    - "SYS"
    - "SYSTEM"
    - "DBSNMP"
    - "OUTLN"
  # 이미 수집한 SQL 중복 방지 (sql_id 기반, 보관 시간)
  dedup_retention_hours: 24
  # cron 실행 간격 (분)
  cron_interval_min: 5

# --- Phase 2: 트레이스 수집 ---
trace:
  # 10046 트레이스 레벨 (1=기본, 4=바인드변수, 8=대기이벤트, 12=바인드+대기)
  trace_level: 12
  # 트레이스 최대 수집 시간 (초) - 이 시간 초과 시 자동 종료
  max_trace_duration_sec: 300
  # Oracle trace 파일 디렉토리 (user_dump_dest 또는 diag)
  # 비워두면 자동 감지
  trace_dir: ""
  # 트레이스 파일 보관 일수
  retention_days: 30
  # SSH 접속 정보 (Windows PC → DB 서버에서 트레이스 파일 가져오기)
  # Oracle trace 파일 디렉토리 (RAC 노드별로 다를 수 있음)
  trace_dir: "/oralog/diag/rdbms/prod/PROD1/trace"
  # SSH 접속 정보 (Windows PC → DB 서버에서 트레이스 파일 가져오기)
  ssh:
    enabled: true
    host: "192.168.50.31"  # 노드1 (oracle19cogg01)
    port: 22
    user: "oracle"         # SSH 접속 사용자
    # 인증 방식: key 또는 password
    auth_method: "key"              # "key" 또는 "password"
    key_path: "~/.ssh/id_ed25519"   # SSH 개인키 경로 (ed25519)
    password_env: "SSH_PWD"         # password 방식일 때 환경변수명
    # RAC 노드별 SSH (10046/10053 수집 시 접속한 인스턴스의 노드로 연결)
    rac_ssh:
      PROD1:
        host: "192.168.50.31"
        trace_dir: "/oralog/diag/rdbms/prod/PROD1/trace"
      PROD2:
        host: "192.168.50.32"
        trace_dir: "/oralog/diag/rdbms/prod/PROD2/trace"

# --- Phase 3: tkprof 분석 ---
tkprof:
  # tkprof 바이너리 경로 (비워두면 $ORACLE_HOME/bin/tkprof)
  binary_path: ""
  # 정렬 기준 (exeela=실행시간, fchela=fetch시간, prsela=파싱시간)
  sort_option: "exeela"
  # 실행계획 포함 여부
  explain_user: ""  # 비워두면 explain plan 생략, 사용자명 넣으면 해당 사용자로 explain
  # 개선 포인트 자동 태깅 규칙
  analysis_rules:
    full_table_scan_threshold: 10000    # 이 행수 이상 FTS는 경고
    nested_loop_threshold: 100000       # NL 조인 대상 행수 경고
    buffer_gets_per_row_threshold: 100  # 행당 buffer gets 경고

# --- Phase 4: 리포트 ---
report:
  # 리포트 유형
  daily_enabled: true
  weekly_enabled: true
  weekly_day: "MON"  # 주간 리포트 생성 요일
  # AWR 스냅샷 연계
  awr:
    # Top SQL 개수
    top_n: 20
    # 스냅샷 간격 기준 (시간)
    snapshot_interval_hours: 1
  # 출력 형식
  output_formats:
    - "html"
    - "xlsx"
  # 메일 발송
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from_addr: ""
    to_addrs: []
    subject_prefix: "[Oracle Tuning]"

# --- 공통 경로 ---
# 상대경로 사용 시 프로젝트 루트(main.py 위치) 기준으로 자동 해석
# 절대경로로 변경 가능 (Windows: C:\oracle-tuning, Linux: /opt/oracle-tuning)
paths:
  base_dir: "."
  log_dir: "./logs"
  trace_output: "./output/traces"
  tkprof_output: "./output/tkprof"
  report_output: "./output/reports"
  dedup_db: "./data/dedup.sqlite"

# --- 로깅 ---
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  max_size_mb: 50
  backup_count: 5

# --- 10053 옵티마이저 트레이스 ---
optimizer_trace:
  enabled: true
  # 수집 방식: explain (EXPLAIN PLAN만) 또는 execute (실제 실행)
  collection_method: "explain"
  # 트레이스 파일 보관 일수
  retention_days: 30
  # 수집 제한
  limits:
    max_concurrent: 2
    timeout_minutes: 15
    max_file_size_mb: 100
  # 분석 규칙
  analysis_rules:
    cardinality_error_threshold: 10
    stale_stats_days: 30
    cost_diff_threshold: 20
